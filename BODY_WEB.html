<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODY BY J.A. - Elite Coach Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a021; --black: #111; --bg: #f0f2f5; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        
        .header { text-align: center; border-bottom: 6px solid var(--gold); padding-bottom: 20px; margin-bottom: 40px; }
        .header h1 { font-weight: 900; font-size: 3.5rem; margin: 0; letter-spacing: -2px; }
        .header span { color: var(--gold); }

        .section-title { background: var(--black); color: white; padding: 12px 25px; font-weight: bold; margin: 30px 0 15px 0; text-transform: uppercase; border-radius: 4px; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 10px; font-weight: 800; margin-bottom: 5px; color: #666; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 2px solid #eee; border-radius: 8px; font-family: inherit; transition: 0.3s; }

        /* Bloques de Rutina */
        .day-container { border: 2px solid #f0f0f0; margin-bottom: 40px; border-radius: 12px; overflow: hidden; background: #fafafa; }
        .day-header { background: var(--black); color: white; padding: 15px 25px; font-size: 1.5rem; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
        
        .exercise-group { background: white; margin: 15px; padding: 20px; border-radius: 10px; border: 1px solid #ddd; position: relative; }
        
        .exercise-sub-row { display: grid; grid-template-columns: 1.5fr 1fr 1.5fr 250px; gap: 15px; padding: 15px 0; align-items: start; }
        
        .metric-split { display: flex; gap: 10px; align-items: center; }
        .metric-field { display: flex; flex-direction: column; flex: 1; }
        .metric-field label { font-size: 9px; color: var(--gold); margin-bottom: 3px; }
        .metric-field input { padding: 10px; text-align: center; font-weight: bold; border-color: #e0e0e0; }

        .img-upload-big { width: 250px; height: 180px; border: 3px dashed #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; background: #fff; }
        .img-upload-big img { width: 100%; height: 100%; object-fit: cover; }
        .img-upload-big input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-add-day { background: var(--gold); color: white; }
        .btn-biserie { background: #eee; color: #333; font-size: 11px; margin-top: 10px; }
        .btn-generate { background: var(--black); color: white; width: 100%; font-size: 1.4rem; padding: 30px; margin-top: 50px; border-radius: 15px; }
        .btn-del { background: #ff4d4d; color: white; font-size: 10px; padding: 5px 10px; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h1>BODY BY <span>J.A.</span></h1>
        <p>CONTROL PANEL | JUAN CARLOS GONZÁLEZ</p>
    </div>

    <!-- DATOS ATLETA -->
    <div class="section-title">Datos del Atleta</div>
    <div class="grid-inputs">
        <div class="field"><label>Nombre del Cliente</label><input type="text" id="p_name"></div>
        <div class="field"><label>ID</label><input type="number" id="p_id"></div>
        <div class="field"><label>Edad</label><input type="number" id="p_age"></div>
        <div class="field"><label>Peso (kg)</label><input type="number" id="p_weight"></div>
        <div class="field"><label>Objetivo</label>
            <select id="p_goal">
                <option>Definición Muscular</option>
                <option>Volumen Muscular</option>
                <option>Mantenimiento Físico</option>
                <option>Recomposicion Corporal</option>
            </select>
        </div>
    </div>

    <div class="section-title">Configurar Rutina</div>
    <div style="text-align:center; padding: 20px; background: #f9f9f9; border-radius: 10px;">
        <label><input type="checkbox" value="Lunes"> Lunes</label>
        <label><input type="checkbox" value="Martes"> Martes</label>
        <label><input type="checkbox" value="Miércoles"> Miércoles</label>
        <label><input type="checkbox" value="Jueves"> Jueves</label>
        <label><input type="checkbox" value="Viernes"> Viernes</label>
        <label><input type="checkbox" value="Sábado"> Sábado</label>
        <button class="btn btn-add-day" onclick="renderDays()" style="margin-left:20px">Crear Días</button>
    </div>

    <div id="routine-builder"></div>

    <button class="btn btn-generate" onclick="generateClientPortal()">GENERAR PLAN PARA EL CLIENTE</button>
</div>

<script>
    const EXERCISES_DB = {
        "PECHO": ["Press de banca con barra", "Press banca inclinado con mancuernas", "Aperturas en máquina Peck Deck o Contractora", "Cruce de poleas", "Press de banca inclinado con barra", "Press de banca con mancuernas", "Aperturas con mancuernas", "Aperturas Inclinadas con mancuernas", "Press de banca en máquina sentado", "Press de banca declinado con barra", "Press de banca declinado con mancuernas", "Flexiones", "Pull over con mancuerna"],
        "ESPALDA": ["Remo con mancuerna a una mano", "Remo con barra", "Remo en barra T", "Remo en máquina", "Remo inclinado con barra con agarre supinado", "Remo inclinado con mancuernas", "Jalón al pecho con agarre cerrado", "Jalón al pecho con agarre invertido", "Pull over con cuerda", "Pull over en polea con barra", "Jalón con agarre ancho", "Elevaciones en barra fija", "Elevaciones en barra fija con agarre supinado", "Pull over con mancuerna", "Pull over con barra", "Encogimiento de hombros con barra", "Encogimiento de hombros con mancuernas"],
        "HOMBROS": [],
        "BICEPS": ["Curl con barra", "Curl alterno con mancuerna", "Curl con cuerda en polea", "Curl con barra EZ", "Curl de predicador con barra EZ", "Curl alterno de martillo con mancuernas", "Curl inclinado con mancuernas", "Curl concentrado con mancuerna", "Curl de cable con barra recta en polea baja", "Curl de cable en polea alta de pie", "Curl de muñeca con barra sentado", "Extensión de muñeca con barra sentado"],
        "TRICEPS":[],
        "CORE/ABS": ["Rueda", "Plancha", "Plancha lateral", "Crunch", "Crunch oblicuo", "Crunch bicicleta", "Elevaciones de piernas colgado", "Abdominales en máquina", "Abdominales con cuerda en polea alta", "Plancha con flexión", "Abdominales con brazos estirados"],
        "CUADRICEPS":["Hack", "Extensión de pierna", "Extensión de pierna unipodal", "Zancadas", "Prensa de pierna", "Prensa frontal", "Tijera estática", "Step up", "Sentadilla goblet", "Sentadilla Smith", "Sentadilla con peso corporal", "Sentadillas con saltos pliometricos", "Sentadillas isometrica apoyo en pared", "Sentadilla búlgara con peso corporal", "Sentadilla búlgara con mancuernas", "Sentadilla búlgara con barra", "Sentadilla con saco", "Sentadilla en polea baja", "Sentadilla talones elevados", "Sentadilla en banco"],
        "ADUCTOR":["Sentadilla sumó con mancuerna", "Prensa en eversión", "Hack en eversión", "Máquina aductor", "Sentadilla sumo con peso corporal", "Aductor con balón"],
        "FEMORAL":["Peso muerto con barra", "Peso muerto unipodal", "Curl acostado", "Curl acostado unipodal", "Curl sentado", "Curl sentado unipodal", "Prensa alta"],
        "GLUTEO":["Sentadilla libre", "Reverso", "Sentadilla búlgara con inclinación", "Step up con mancuerna", "Patada en polea", "Tijera estatica en Smith", "Sentadilla sumo con barra", "Hip thrusts", "Hip thrusts unipodal", "Puente con banda", "Puente con propio peso", "Puente con balón Fit ball", "Extensión de cadera con mancuerna", "Abducción en máquina", "Abducción unipodal en polea"],
        "PANTORRILLA":["Pantorrilla en prensa", "Pantorrilla en hack", "Planti flexión dorsi flexión en máquina ", "Elevación de talones de pie sin peso", "Elevación de talones en máquina Smit", "Elevación de talones en máquina sentado", "Elevación de talones unipodal con peso", "Elevación de talones unipodal sin peso"],
        "SALTOS": ["Saltar cuerda", "Burpees", "Jumping jacks", "Sprints", "Columpios"],
        "CARDIO": ["Caminadora", "Bicicleta estática", "Elíptica", "Escaladora"]
    };

    function renderDays() {
        const container = document.getElementById('routine-builder');
        container.innerHTML = '';
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(day => {
            const div = document.createElement('div');
            div.className = 'day-container';
            div.innerHTML = `
                <div class="day-header">${day.value} <button class="btn btn-add-day" onclick="addExGroup('${day.value}')">+ Bloque</button></div>
                <div id="list-${day.value}"></div>
            `;
            container.appendChild(div);
        });
    }

    function addExGroup(day) {
        const list = document.getElementById(`list-${day}`);
        const group = document.createElement('div');
        group.className = 'exercise-group';
        group.innerHTML = `
            <button class="btn btn-del" onclick="this.parentElement.remove()">Eliminar</button>
            <div class="rows-holder">${createExRowHTML()}</div>
            <button class="btn btn-biserie" onclick="toBiserie(this)">➕ Agregar Biserie</button>
            <div style="text-align:center; color:var(--gold); font-weight:bold; font-size:11px; margin-top:15px;">⌛ 3 MINUTOS DE DESCANSO POST-BLOQUE</div>
        `;
        list.appendChild(group);
    }

    function createExRowHTML() {
        let opts = '<option value="">- Seleccionar -</option>';
        for(let cat in EXERCISES_DB) {
            opts += `<optgroup label="${cat}">`;
            EXERCISES_DB[cat].forEach(ex => opts += `<option value="${ex}">${ex}</option>`);
            opts += `</optgroup>`;
        }
        return `
            <div class="exercise-sub-row">
                <div class="field"><label>EJERCICIO</label><select class="sel-name" onchange="toggleCardio(this)">${opts}</select></div>
                <div class="field">
                    <label>MÉTRICA</label>
                    <div class="metric-split">
                        <div class="metric-field"><label>SERIES</label><input type="text" class="m-series" placeholder="S"></div>
                        <div class="metric-field"><label>REPS</label><input type="text" class="m-reps" placeholder="R"></div>
                    </div>
                </div>
                <div class="field"><label>NOTAS DEL COACH</label><textarea class="sel-note" rows="3"></textarea></div>
                <div class="img-upload-big"><span>+ Foto</span><input type="file" accept="image/*" onchange="handleImg(this)"><img src="" style="display:none"></div>
            </div>`;
    }

    function toggleCardio(select) {
        const isCardio = EXERCISES_DB["CARDIO"].includes(select.value);
        const metricDiv = select.closest('.exercise-sub-row').querySelector('.metric-split');
        if(isCardio) {
            metricDiv.innerHTML = `<div class="metric-field"><label>TIEMPO (MIN)</label><input type="text" class="m-series" style="width:100px" placeholder="00"><input type="hidden" class="m-reps" value="MIN"></div>`;
        } else {
            metricDiv.innerHTML = `
                <div class="metric-field"><label>SERIES</label><input type="text" class="m-series" placeholder="S"></div>
                <div class="metric-field"><label>REPS</label><input type="text" class="m-reps" placeholder="R"></div>`;
        }
    }

    function toBiserie(btn) {
        const holder = btn.parentElement.querySelector('.rows-holder');
        if(holder.children.length < 2) {
            holder.insertAdjacentHTML('beforeend', createExRowHTML());
            btn.style.display = 'none';
        }
    }

    function handleImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = input.nextElementSibling;
                img.src = e.target.result;
                img.style.display = 'block';
                input.previousElementSibling.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function generateClientPortal() {
        const athlete = {
            name: document.getElementById('p_name').value || 'Atleta',
            goal: document.getElementById('p_goal').value,
            weight: document.getElementById('p_weight').value,
            days: []
        };

        document.querySelectorAll('.day-container').forEach(dayBox => {
            const dayName = dayBox.querySelector('.day-header').innerText.split('+')[0].trim();
            const groups = [];
            dayBox.querySelectorAll('.exercise-group').forEach(group => {
                const subRows = [];
                group.querySelectorAll('.exercise-sub-row').forEach(row => {
                    subRows.push({
                        name: row.querySelector('.sel-name').value,
                        series: row.querySelector('.m-series').value,
                        reps: row.querySelector('.m-reps').value,
                        note: row.querySelector('.sel-note').value,
                        img: row.querySelector('img').src
                    });
                });
                groups.push(subRows);
            });
            athlete.days.push({ name: dayName, content: groups });
        });

        let routineHtml = '';
        athlete.days.forEach(day => {
            routineHtml += `
                <div class="client-day-header">
                    <span>${day.name}</span>
                    <span class="day-contact">
                        @juancarlosgc03_18 | 
                        <svg viewBox="0 0 24 24" width="14" style="vertical-align:middle; margin-left:10px;"><path fill="#c5a021" d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
                        3013806239
                    </span>
                </div>`;
            day.content.forEach(group => {
                const isBis = group.length > 1;
                routineHtml += `<div class="client-ex-card ${isBis ? 'biserie-card' : ''}">`;
                if(isBis) routineHtml += `<div class="biserie-tag">BISERIE (A + B)</div>`;
                group.forEach((ex, idx) => {
                    const metricText = ex.reps === "MIN" ? `${ex.series} Minutos` : `${ex.series} Series x ${ex.reps} Reps`;
                    routineHtml += `
                        <div class="client-row">
                            <div class="client-info">
                                <div class="client-ex-name">${isBis ? (idx===0?'A. ':'B. ') : ''}${ex.name}</div>
                                <div class="client-metric">${metricText}</div>
                                <div class="client-note">${ex.note}</div>
                            </div>
                            <div class="client-img-large">${ex.img ? `<img src="${ex.img}">` : ''}</div>
                        </div>`;
                });
                routineHtml += `<div class="client-rest-bar">⌛ 3 MINUTOS DE DESCANSO POST-BLOQUE</div></div>`;
            });
        });

        const finalTemplate = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Plan - ${athlete.name}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; }
        .wrapper { max-width: 900px; margin: 0 auto; background: #fff; color: #111; border-radius: 20px; overflow: hidden; padding-bottom: 40px;}
        .top-banner { background: #000; color: #fff; padding: 40px 10px; border-bottom: 8px solid #c5a021; text-align:center; }
        .intro-box { padding: 40px; font-size: 14px; text-align: justify; border-bottom: 1px solid #eee; }
        .mv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 30px 40px; background: #fafafa;}
        .mv-box { border-left: 4px solid #c5a021; padding-left: 15px; font-size: 12px; }
        .client-day-header { background: #000; color: #fff; padding: 15px 40px; font-size: 18px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
        .day-contact { font-size: 11px; font-weight: 400; color: #c5a021; display: flex; align-items: center; gap: 5px;}
        .client-ex-card { margin: 20px 40px; border: 2px solid #eee; border-radius: 15px; overflow: hidden; }
        .biserie-card { border-color: #c5a021; border-width: 3px; }
        .biserie-tag { background: #c5a021; color: #fff; text-align: center; padding: 5px; font-weight: 900; font-size: 11px; }
        .client-row { display: grid; grid-template-columns: 1fr 250px; gap: 20px; padding: 25px; border-bottom: 1px solid #eee; align-items: center;}
        .client-ex-name { font-weight: 900; font-size: 20px; color: #000; }
        .client-metric { font-weight: 700; color: #c5a021; margin: 8px 0; font-size: 18px; }
        .client-note { font-size: 13px; color: #666; font-style: italic; }
        .client-img-large img { width: 250px; height: 180px; object-fit: cover; border-radius: 10px; }
        .client-rest-bar { background: #fff8e1; color: #b78d00; text-align: center; padding: 10px; font-weight: 900; font-size: 13px; }
        
        .footer-premium { background: #111; color: #fff; padding: 40px; border-top: 8px solid #c5a021; }
        .footer-premium h3 { color: #c5a021; text-transform: uppercase; margin-top: 0; }
        .recommendations-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 13px; }
        .rec-item { margin-bottom: 10px; border-left: 2px solid #444; padding-left: 10px; }
        .contact-reminder { margin-top: 30px; text-align: center; background: #c5a021; color: #000; padding: 15px; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="top-banner">
            <h1 style="margin:0; font-size:45px; font-weight:900;">BODY BY <span style="color:#c5a021">J.A.</span></h1>
            <p style="margin:0; font-size:12px; font-weight:700; letter-spacing:2px;">BY JUAN CARLOS GONZÁLEZ</p>
        </div>

        <div class="intro-box">
            <h2 style="color:#c5a021; margin-top:0">¡Hola, ${athlete.name}!</h2>
            <p><strong>Soy Juan Carlos González, TU Entrenador personal.</strong> Mi trabajo se trata de ser tu guía, tu motivador y tu mayor apoyo en este camino. Estoy aquí para ofrecerte el conocimiento y la dedicación que necesitas para transformar tu cuerpo y tu mente. Mi enfoque es totalmente personalizado, garantizando que cada plan esté diseñado para tus objetivos únicos, tus capacidades y tu estilo de vida. Juntos, superaremos cualquier obstáculo y celebraremos cada victoria, por pequeña que sea.</p>
        </div>

        <div class="mv-grid">
            <div class="mv-box"><h4>MISIÓN</h4><p>Empoderar a las personas a través del ejercicio y el conocimiento, creando planes inteligentes que no solo construyan un cuerpo fuerte, sino también una mentalidad resiliente y segura.</p></div>
            <div class="mv-box"><h4>VISIÓN</h4><p>Ser el catalizador del cambio, ayudando a alcanzar un bienestar físico y mental sostenible, convirtiendo la disciplina en un hábito.</p></div>
        </div>

        <div style="margin: 20px 40px; background:#f4f4f4; padding:15px; border-radius:10px; display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
            <span>OBJETIVO: ${athlete.goal}</span>
            <span>PESO INICIAL: ${athlete.weight} KG</span>
        </div>

        ${routineHtml}

        <!-- NUEVA SECCIÓN DE RECOMENDACIONES -->
        <div class="footer-premium">
            <h3>Protocolo de Seguridad y Bienestar</h3>
            <div class="recommendations-grid">
                <div class="rec-item"><strong>Calentamiento:</strong> Realiza 10-15 minutos de movilidad articular y cardio ligero antes de comenzar.</div>
                <div class="rec-item"><strong>Prioridad Técnica:</strong> La técnica siempre va antes que el peso. Si pierdes la forma, reduce la carga inmediatamente.</div>
                <div class="rec-item"><strong>Manejo de Cargas:</strong> Comienza con un peso moderado que puedas controlar perfectamente antes de intentar progresar.</div>
                <div class="rec-item"><strong>Hidratación:</strong> Consume agua en pequeños sorbos antes, durante y después de la sesión.</div>
                <div class="rec-item"><strong>Seguridad:</strong> Asegura bien los discos y utiliza el equipamiento de forma responsable.</div>
                <div class="rec-item"><strong>Enfriamiento:</strong> Al terminar, dedica 5 minutos a estiramientos suaves y respiración controlada.</div>
            </div>

            <div class="contact-reminder">
                ⚠️ ¿Tienes dudas sobre la ejecución o el plan? ¡Contáctame de inmediato para asesorarte!
            </div>
        </div>
    </div>
</body>
</html>`;

        const blob = new Blob([finalTemplate], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Plan_BODYBYJA_${athlete.name.replace(/ /g,'_')}.html`;
        a.click();
    }
</script>

</body>
</html>
